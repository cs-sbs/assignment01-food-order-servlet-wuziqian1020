<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>外卖平台 - 首页</title>
</head>
<body>
<h1>欢迎来到外卖平台</h1>

<h2>新增订单</h2>
<form action="/order" method="post">
    用户: <input name="customer"><br>
    食物: <input name="food"><br>
    数量: <input name="quantity"><br>
    <input type="submit">
</form>

<h2>菜单查询</h2>
<a href="/menu">查看所有菜单</a>
<form action="/menu" method="get">
    菜名搜索: <input name="name">
    <input type="submit">
</form>
</body>
</html>
